<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdWords Automator - Dashboard</title>
  <style>
    :root {
      --bg: #0a0e14;
      --bg-card: #131820;
      --bg-card-hover: #1a1f2e;
      --border: #1e2533;
      --text: #c8ccd4;
      --text-dim: #6c7380;
      --green: #00c853;
      --red: #ff1744;
      --orange: #ff9100;
      --blue: #448aff;
      --purple: #7c4dff;
      --cyan: #00bcd4;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    header h1 span { color: var(--blue); }
    .status-bar {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 0.78rem;
      color: var(--text-dim);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }
    .status-dot.online { background: var(--green); }
    .status-dot.offline { background: var(--red); }
    .status-dot.warning { background: var(--orange); }
    main {
      display: grid;
      grid-template-columns: 1fr 300px;
      grid-template-rows: auto 1fr;
      gap: 16px;
      padding: 16px 24px;
      max-width: 1600px;
      margin: 0 auto;
    }
    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow: hidden;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .panel-header h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
    }
    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
    }
    .badge-active { background: rgba(0,200,83,0.15); color: var(--green); }
    .badge-paused { background: rgba(255,145,0,0.15); color: var(--orange); }
    .badge-fraud { background: rgba(255,23,68,0.15); color: var(--red); }
    .campaigns-grid {
      grid-column: 1;
    }
    .sidebar {
      grid-column: 2;
      grid-row: 1 / span 2;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .campaign-card {
      background: var(--bg-card-hover);
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 10px;
      border-left: 3px solid var(--border);
      transition: all 0.2s;
      cursor: pointer;
    }
    .campaign-card:hover { border-left-color: var(--blue); }
    .campaign-card.active { border-left-color: var(--green); }
    .campaign-card.paused { border-left-color: var(--orange); }
    .campaign-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .campaign-name { font-weight: 600; font-size: 0.9rem; }
    .campaign-status {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .campaign-status.active { background: rgba(0,200,83,0.15); color: var(--green); }
    .campaign-status.paused { background: rgba(255,145,0,0.15); color: var(--orange); }
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 8px;
    }
    .metric {
      text-align: center;
    }
    .metric-value {
      font-size: 1.1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .metric-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .metric-value.roi-positive { color: var(--green); }
    .metric-value.roi-negative { color: var(--red); }
    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    .progress-fill.good { background: var(--green); }
    .progress-fill.warning { background: var(--orange); }
    .progress-fill.danger { background: var(--red); }
    .alert-item {
      background: rgba(255,23,68,0.08);
      border: 1px solid rgba(255,23,68,0.2);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 0.78rem;
    }
    .alert-item .alert-ip {
      font-weight: 600;
      color: var(--red);
    }
    .alert-item .alert-score {
      font-size: 0.7rem;
      color: var(--text-dim);
    }
    .alert-item .alert-reasons {
      font-size: 0.7rem;
      color: var(--orange);
      margin-top: 2px;
    }
    .schedule-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
    }
    .schedule-item:last-child { border-bottom: none; }
    .schedule-time { color: var(--cyan); font-weight: 500; }
    .schedule-name { flex: 1; margin-left: 8px; }
    .schedule-bid { color: var(--text-dim); font-size: 0.7rem; }
    .event-item {
      background: rgba(124,77,255,0.1);
      border: 1px solid rgba(124,77,255,0.2);
      border-radius: 4px;
      padding: 8px 10px;
      margin-bottom: 6px;
      font-size: 0.78rem;
    }
    .event-type {
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 8px;
      display: inline-block;
      margin-right: 6px;
    }
    .event-type.blackout { background: rgba(255,23,68,0.2); color: var(--red); }
    .event-type.boost { background: rgba(0,200,83,0.2); color: var(--green); }
    .event-type.pause { background: rgba(255,145,0,0.2); color: var(--orange); }
    .empty-state {
      text-align: center;
      color: var(--text-dim);
      padding: 24px;
      font-size: 0.82rem;
    }
    .charts-row {
      grid-column: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .chart-container {
      height: 120px;
      position: relative;
    }
    .chart-line {
      stroke: var(--blue);
      stroke-width: 2;
      fill: none;
    }
    .chart-area {
      fill: url(#blueGradient);
      opacity: 0.3;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      color: var(--green);
    }
    .pulse-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
      }
      .sidebar { grid-column: 1; grid-row: auto; }
      .charts-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>⚡ <span>AdWords</span> Automator</h1>
    <div class="status-bar">
      <span><span class="status-dot online" id="ws-dot"></span> <span id="ws-status">Connexion...</span></span>
      <span class="live-indicator"><span class="pulse-dot"></span> Live</span>
      <span id="clock">--:--:--</span>
    </div>
  </header>

  <main>
    <!-- Campagnes -->
    <section class="panel campaigns-grid">
      <div class="panel-header">
        <h2>📊 Campagnes</h2>
        <span id="campaign-count" style="font-size:0.75rem;color:var(--text-dim)">0 actives</span>
      </div>
      <div id="campaigns-container">
        <div class="empty-state">Chargement des campagnes...</div>
      </div>
    </section>

    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Alertes fraude -->
      <section class="panel">
        <div class="panel-header">
          <h2>🛡️ Alertes Fraude</h2>
          <span id="fraud-count" class="badge badge-fraud">0</span>
        </div>
        <div id="alerts-container">
          <div class="empty-state">Aucune alerte récente</div>
        </div>
      </section>

      <!-- Calendrier du jour -->
      <section class="panel">
        <div class="panel-header">
          <h2>📅 Aujourd'hui</h2>
          <span style="font-size:0.7rem;color:var(--text-dim)" id="current-day"></span>
        </div>
        <div id="schedules-container">
          <div class="empty-state">Chargement...</div>
        </div>
      </section>

      <!-- Événements à venir -->
      <section class="panel">
        <div class="panel-header">
          <h2>🔮 À venir</h2>
        </div>
        <div id="events-container">
          <div class="empty-state">Aucun événement</div>
        </div>
      </section>
    </aside>

    <!-- Mini graphiques et résumé -->
    <section class="panel charts-row">
      <div>
        <div class="panel-header"><h2>📈 ROI (dernière heure)</h2></div>
        <div class="chart-container">
          <svg width="100%" height="120" id="roi-chart"></svg>
        </div>
      </div>
      <div>
        <div class="panel-header"><h2>👆 Clics / minute</h2></div>
        <div class="chart-container">
          <svg width="100%" height="120" id="clicks-chart"></svg>
        </div>
      </div>
    </section>
  </main>

  <script>
    // ============================================================
    //  WebSocket
    // ============================================================
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${protocol}//${location.host}`);

    ws.onopen = () => {
      document.getElementById('ws-dot').className = 'status-dot online';
      document.getElementById('ws-status').textContent = 'Connecté';
    };

    ws.onclose = () => {
      document.getElementById('ws-dot').className = 'status-dot offline';
      document.getElementById('ws-status').textContent = 'Déconnecté';
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      switch (msg.type) {
        case 'initial_state':
          renderInitialState(msg.data);
          break;
        case 'metrics_update':
          updateMetrics(msg.data);
          break;
        case 'fraud_alert':
          addFraudAlert(msg.data);
          break;
        case 'roi_adjustment':
          addRoiAdjustment(msg.data);
          break;
        case 'campaign_status_change':
          updateCampaignStatus(msg.data);
          break;
      }
    };

    // ============================================================
    //  Rendu
    // ============================================================
    let campaignsState = new Map();
    let fraudAlerts = [];
    const MAX_ALERTS = 20;

    function renderInitialState(data) {
      data.campaigns.forEach(c => campaignsState.set(c.id, c));
      renderCampaigns();
      loadCalendarData();
      loadEventsData();
    }

    function updateMetrics(data) {
      data.campaigns.forEach(c => {
        const existing = campaignsState.get(c.id);
        campaignsState.set(c.id, { ...existing, ...c });
      });
      renderCampaigns();
      updateCharts();
    }

    function addFraudAlert(data) {
      fraudAlerts.unshift(data);
      if (fraudAlerts.length > MAX_ALERTS) fraudAlerts.pop();
      renderAlerts();
    }

    function addRoiAdjustment(data) {
      // Flash visuel sur la campagne concernée
      if (data.campaignId) {
        const card = document.querySelector(`[data-campaign-id="${data.campaignId}"]`);
        if (card) {
          card.style.transition = 'none';
          card.style.borderLeftColor = 'var(--purple)';
          setTimeout(() => { card.style.transition = 'all 0.5s'; card.style.borderLeftColor = ''; }, 300);
        }
      }
    }

    function updateCampaignStatus(data) {
      const c = campaignsState.get(data.campaignId);
      if (c) {
        c.status = data.newStatus;
        campaignsState.set(data.campaignId, c);
        renderCampaigns();
      }
    }

    function renderCampaigns() {
      const container = document.getElementById('campaigns-container');
      const campaigns = Array.from(campaignsState.values());

      if (campaigns.length === 0) {
        container.innerHTML = '<div class="empty-state">Aucune campagne — créez-en une via l\'API</div>';
        return;
      }

      document.getElementById('campaign-count').textContent =
        `${campaigns.filter(c => c.status === 'active').length} actives / ${campaigns.length} total`;

      container.innerHTML = campaigns.map(c => `
        <div class="campaign-card ${c.status}" data-campaign-id="${c.id}">
          <div class="campaign-header">
            <span class="campaign-name">${escapeHtml(c.name)}</span>
            <span class="campaign-status ${c.status}">${c.status === 'active' ? '▶ Actif' : '⏸ Pause'}</span>
          </div>
          <div class="metrics-row">
            <div class="metric">
              <div class="metric-value">${formatNum(c.impressions || 0)}</div>
              <div class="metric-label">Impressions</div>
            </div>
            <div class="metric">
              <div class="metric-value">${formatNum(c.clicks || 0)}</div>
              <div class="metric-label">Clics</div>
            </div>
            <div class="metric">
              <div class="metric-value">${(c.spend || 0).toFixed(2)} €</div>
              <div class="metric-label">Coût</div>
            </div>
            <div class="metric">
              <div class="metric-value ${(c.roi || 0) >= 0 ? 'roi-positive' : 'roi-negative'}">${(c.roi || 0).toFixed(1)}%</div>
              <div class="metric-label">ROI</div>
            </div>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${getBudgetClass(c.budgetUsage || 0)}" style="width:${Math.min(c.budgetUsage || 0, 100)}%"></div>
          </div>
          <div style="font-size:0.65rem;color:var(--text-dim);margin-top:4px;text-align:right">
            Budget: ${(c.spend || 0).toFixed(2)} / ${(c.dailyBudget || 0).toFixed(2)} €
            · CPC: ${(c.cpc || 0).toFixed(2)} €
            · Conv: ${(c.conversions || 0).toFixed(1)}
          </div>
        </div>
      `).join('');
    }

    function renderAlerts() {
      const container = document.getElementById('alerts-container');
      document.getElementById('fraud-count').textContent = fraudAlerts.length;

      if (fraudAlerts.length === 0) {
        container.innerHTML = '<div class="empty-state">✅ Aucune alerte récente</div>';
        return;
      }

      container.innerHTML = fraudAlerts.map(a => `
        <div class="alert-item">
          <div><span class="alert-ip">${escapeHtml(a.ip || 'N/A')}</span></div>
          <div class="alert-score">Score: ${a.score}/100 · ${a.timestamp ? new Date(a.timestamp).toLocaleTimeString() : ''}</div>
          ${a.reasons ? `<div class="alert-reasons">${escapeHtml(Array.isArray(a.reasons) ? a.reasons.join(', ') : a.reasons)}</div>` : ''}
        </div>
      `).join('');
    }

    async function loadCalendarData() {
      try {
        const res = await fetch('/api/calendar/state');
        const state = await res.json();
        renderCalendarState(state);
      } catch (e) { /* ignore */ }
    }

    function renderCalendarState(state) {
      if (!state) return;

      const days = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
      document.getElementById('current-day').textContent = `${days[state.currentDay] || ''} ${state.currentTime || ''}`;

      const schedContainer = document.getElementById('schedules-container');
      if (!state.todaySchedules || state.todaySchedules.length === 0) {
        schedContainer.innerHTML = '<div class="empty-state">Pas de diffusion aujourd\'hui</div>';
      } else {
        schedContainer.innerHTML = state.todaySchedules.map(s => `
          <div class="schedule-item">
            <span class="schedule-time">${s.start} - ${s.end}</span>
            <span class="schedule-name">${escapeHtml(s.campaignName || '')}</span>
            ${s.bidAdjustment && s.bidAdjustment !== 1 ? `<span class="schedule-bid">×${s.bidAdjustment}</span>` : ''}
          </div>
        `).join('');
      }
    }

    async function loadEventsData() {
      try {
        const res = await fetch('/api/calendar/events');
        const events = await res.json();
        renderEvents(events);
      } catch (e) { /* ignore */ }
    }

    function renderEvents(events) {
      const container = document.getElementById('events-container');
      if (!events || events.length === 0) {
        container.innerHTML = '<div class="empty-state">Aucun événement à venir</div>';
        return;
      }
      container.innerHTML = events.slice(0, 10).map(e => `
        <div class="event-item">
          <span class="event-type ${e.type}">${e.type.toUpperCase()}</span>
          <span>${escapeHtml(e.name)}</span>
          <div style="font-size:0.65rem;color:var(--text-dim);margin-top:2px">
            ${new Date(e.start_date).toLocaleDateString()} → ${new Date(e.end_date).toLocaleDateString()}
          </div>
        </div>
      `).join('');
    }

    // Mini graphiques (placeholder)
    function updateCharts() {
      // ROI chart placeholder
      const roiSvg = document.getElementById('roi-chart');
      if (roiSvg && roiSvg.children.length === 0) {
        roiSvg.innerHTML = `
          <defs><linearGradient id="blueGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#448aff" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#448aff" stop-opacity="0"/>
          </linearGradient></defs>
          <text x="50%" y="60" text-anchor="middle" fill="#6c7380" font-size="12">Données en direct via WebSocket</text>
        `;
      }
      const clicksSvg = document.getElementById('clicks-chart');
      if (clicksSvg && clicksSvg.children.length === 0) {
        clicksSvg.innerHTML = `
          <text x="50%" y="60" text-anchor="middle" fill="#6c7380" font-size="12">Métriques minute par minute</text>
        `;
      }
    }

    // ============================================================
    //  Utilitaires
    // ============================================================
    function formatNum(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
      return n.toString();
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function getBudgetClass(usage) {
      if (usage > 90) return 'danger';
      if (usage > 70) return 'warning';
      return 'good';
    }

    // Horloge
    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Rafraîchit le calendrier toutes les minutes
    setInterval(() => {
      loadCalendarData();
      loadEventsData();
    }, 60000);

    updateCharts();
  </script>
</body>
</html>
